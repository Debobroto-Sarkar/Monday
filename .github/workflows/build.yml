name: Build Monday APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Get the code ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Set up Java ───────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Step 3: Cache Gradle (speeds up builds dramatically) ──────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Step 4: Make Gradle executable ───────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Step 5: Build the Debug APK ───────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── Step 6: Upload APK as artifact ────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Monday-debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # Keep for 30 days

      # ── Step 7: Create a GitHub Release (only on push to main) ────────
      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Monday v1.0 (Build ${{ github.run_number }})"
          body: |
            ## Monday AI Assistant — Latest Build
            
            ### How to Install:
            1. Download `app-debug.apk` below
            2. On your S23 Ultra: Settings → Apps → Install unknown apps → Chrome → Allow
            3. Open the downloaded APK and install
            4. Follow the setup guide in the README
            
            ### Build Info:
            - Commit: ${{ github.sha }}
            - Built: ${{ github.event.head_commit.timestamp }}
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
